services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    container_name: laravel_db
    restart: always
    environment:
      - POSTGRES_DB=app
      - POSTGRES_USER=laravel
      - POSTGRES_PASSWORD=secret
    ports:
      - "3306:3306"
    volumes:
      - pgsql-data:/var/lib/postgresql

volumes:
  pgsql-data: