services:
   app:
      build: .
      ports:
         - "5000:5000"

   mysql:
      image: mysql:8.0
      environment:
         MYSQL_DATABASE: flask_db
         MYSQL_ROOT_PASSWORD: password
      ports:
         - "3308:3306"
      volumes:
      - mysql_data:/var/lib/mysql

volumes:
   mysql_data: